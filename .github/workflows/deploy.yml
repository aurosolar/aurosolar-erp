# .github/workflows/deploy.yml
# Deploy automático al VPS tras push a main
name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /var/www/erp
            git pull origin main
            npm ci --production
            npx prisma migrate deploy
            npx prisma generate
            npm run build
            pm2 restart aurosolar-erp || pm2 start npm --name "aurosolar-erp" -- start
